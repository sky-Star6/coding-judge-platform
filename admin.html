<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고리즘 훈련장 - 관리자 패널</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-header: #333333;
            --text-main: #d4d4d4;
            --text-muted: #858585;
            --border-color: #3e3e42;
            --accent-color: #9C27B0;
            /* 관리자 퍼플 */
            --accent-hover: #ba3dd1;
            --success: #89d185;
            --error: #f48771;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        header {
            background-color: var(--bg-header);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header-title {
            font-weight: bold;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        h2 {
            margin-top: 0;
            color: white;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        select,
        input,
        textarea,
        button {
            background-color: var(--bg-dark);
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 4px;
        }

        button {
            background-color: var(--accent-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 8px 16px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            box-sizing: border-box;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .testcase-group {
            border: 1px dashed var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            background-color: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="header-title">👨‍💻 알고리즘 훈련장 <span
                style="font-size: 0.6em; color: var(--accent-color);">[접근 통제소]</span></a>
        <div style="margin-left: auto;">
            <button onclick="window.location.href='index.html'"
                style="background:transparent; border:1px solid #666;">홈으로 가기</button>
        </div>
    </header>

    <div class="container">
        <!-- 좌측: 유저 등급 관리 -->
        <div class="panel">
            <h2>👥 사용자 등급 (Role) 통제</h2>
            <table id="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>계정/닉네임</th>
                        <th>상세 인적사항</th> <!-- 10단계 추가 -->
                        <th>현재 등급</th>
                        <th>등급 변경</th>
                        <th>정보 개입</th> <!-- 11단계 수정 -->
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- 유저 목록 렌더링 -->
                </tbody>
            </table>
        </div>

        <!-- 우측: 새 문제 추가 -->
        <div class="panel">
            <h2>📝 신규 문제(데이터) 추가</h2>
            <form id="problem-form">
                <div class="form-group">
                    <label>문제 제목</label>
                    <input type="text" id="p-title" required placeholder="예: 두 수의 합">
                </div>
                <div class="form-group">
                    <label>난이도 설정 (1~3)</label>
                    <select id="p-diff">
                        <option value="1">1 (초보 - 3급 전용)</option>
                        <option value="2">2 (중수 - 2급 진입)</option>
                        <option value="3">3 (고수 - 1급 해금)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>상세 설명 (마크다운 지원)</label>
                    <textarea id="p-desc" required placeholder="두 정수 A와 B를 입력받은 다음, A+B를 출력하는 프로그램을 작성하시오."></textarea>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex:1;">
                        <label>시간 제한 (초)</label>
                        <input type="number" id="p-time" step="0.1" value="1.0" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>메모리 제한 (MB)</label>
                        <input type="number" id="p-memory" value="128" required>
                    </div>
                </div>

                <h3>🧪 테스트 케이스</h3>
                <div id="testcases-container">
                    <div class="testcase-group">
                        <div class="form-group">
                            <label>입력값 (Input)</label>
                            <textarea class="tc-in" rows="2" placeholder="1 2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>기대 출력값 (Output)</label>
                            <textarea class="tc-out" rows="2" placeholder="3"></textarea>
                        </div>
                    </div>
                </div>

                <button type="button" onclick="addTestCaseSlot()"
                    style="background:transparent; border:1px dashed #666; width:100%; margin-bottom: 20px;">+ 빈 테스트 케이스
                    추가</button>

                <button type="submit" style="width:100%; font-size: 1.1rem; padding: 12px;">클라우드 데이터베이스에 발행 🚀</button>
            </form>
            <div id="p-msg" style="margin-top:15px; text-align:center;"></div>
        </div>
    </div>

    <!-- 관리자용 회원정보 강제 수정 모달 (11단계 신설) -->
    <div id="edit-modal" class="modal"
        style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.7);">
        <div class="modal-content"
            style="background-color: var(--bg-panel); margin: 7% auto; padding: 25px; border: 1px solid var(--border-color); width: 450px; border-radius: 8px;">
            <h2 style="margin-top: 0;">🛠️ 회원정보 강제 수정</h2>
            <p id="edit-username-display"
                style="color: var(--accent-color); font-weight: bold; margin-bottom: 20px; font-size: 1.1rem;"></p>
            <form id="edit-user-form">
                <input type="hidden" id="edit-user-id">

                <div class="form-group">
                    <label>새로운 비밀번호 <span style="color:var(--error); font-size:0.8rem;">(입력 시 덮어쓰기 됨)</span></label>
                    <input type="password" id="edit-pw" placeholder="변경할 경우에만 입력 (기존 유지 시 빈칸)">
                </div>

                <hr style="border: 0; border-top: 1px dotted var(--border-color); margin: 15px 0;">

                <div class="form-group">
                    <label>생년월일</label>
                    <input type="text" id="edit-birth" placeholder="예) 20100512">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 2;">
                        <label>소속 학교</label>
                        <input type="text" id="edit-school" placeholder="예) 구미중학교">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>학년</label>
                        <input type="text" id="edit-grade" placeholder="예) 3학년">
                    </div>
                </div>
                <div class="form-group">
                    <label>전화번호</label>
                    <input type="text" id="edit-phone" placeholder="예) 010-1234-5678">
                </div>

                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="submit" style="flex: 1; font-size: 1.05rem;">수정 내용 덮어쓰기</button>
                    <button type="button" onclick="closeEditModal()"
                        style="flex: 1; background-color: transparent; border: 1px solid #777;">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        // 1. 보안 리다이렉트
        if (localStorage.getItem('role') !== 'admin') {
            alert('관리자 권한이 필요합니다!');
            window.location.href = 'index.html';
        }

        // --- 사용자 목록 불러오기 ---
        async function fetchUsers() {
            const res = await fetch(`${API_BASE_URL}/admin/users`);
            const data = await res.json();
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '';

            data.users.forEach(u => {
                // 승인/정지 버튼 상태 렌더링
                const statusHtml = `
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <button onclick="changeStatus(${u.id}, 1)" style="flex:1; padding:4px; font-size:0.8rem; ${u.is_active ? 'background-color:var(--success); color:black;' : 'background-color:transparent; border:1px solid #777;'}">승인 O</button>
                        <button onclick="changeStatus(${u.id}, 0)" style="flex:1; padding:4px; font-size:0.8rem; ${!u.is_active ? 'background-color:var(--error); color:black;' : 'background-color:transparent; border:1px solid #777;'}">정지 됨</button>
                    </div>
                `;

                tbody.innerHTML += `
                    <tr>
                        <td>${u.id}</td>
                        <td>
                            <strong>${u.nickname}</strong><br>
                            <small style="color:var(--text-muted)">${u.username}</small>
                            ${statusHtml}
                        </td>
                        <td style="font-size: 0.85rem; color: var(--text-muted);">
                            🏫 ${u.school_name || '-'}(${u.grade || '-'})<br>
                            📞 ${u.phone_number || '-'}<br>
                            🎂 ${u.birth_date || '-'}
                        </td>
                        <td>${u.role}</td>
                        <td>
                            <select onchange="changeRole(${u.id}, this.value)" style="width:100px;">
                                <option value="level_3" ${u.role === 'level_3' ? 'selected' : ''}>🥉 3급</option>
                                <option value="level_2" ${u.role === 'level_2' ? 'selected' : ''}>🥈 2급</option>
                                <option value="level_1" ${u.role === 'level_1' ? 'selected' : ''}>🥇 1급</option>
                                <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>👑 관리자</option>
                            </select>
                        </td>
                        <td>
                            <button onclick="openEditModal(${u.id}, '${u.username}', '${u.birth_date}', '${u.school_name}', '${u.grade}', '${u.phone_number}')" style="background-color: #2196F3; font-size: 0.8rem; padding: 4px 8px;">✏️ 수정</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 등급(Role) 수동 변경 API 송출
        async function changeRole(userId, newRole) {
            if (!confirm(`사용자의 권한을 [${newRole}]로 변경하시겠습니까?`)) {
                fetchUsers(); // 롤백
                return;
            }
            const res = await fetch(`${API_BASE_URL}/admin/users/${userId}/role`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: newRole })
            });
            if (res.ok) fetchUsers();
            else alert('등급 변경에 실패했습니다.');
        }

        // 유저 차단/승인 상태 스위치 토글 API 송출
        async function changeStatus(userId, isActiveNumber) {
            const res = await fetch(`${API_BASE_URL}/admin/users/${userId}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_active: isActiveNumber })
            });
            if (res.ok) fetchUsers();
            else alert('상태 변경에 실패했습니다.');
        }

        // --- 회원정보 수정 모달 로직 (11단계) ---
        function openEditModal(id, username, birth, school, grade, phone) {
            document.getElementById('edit-user-id').value = id;
            document.getElementById('edit-username-display').innerText = `대상 계정: [ ${username} ]`;
            document.getElementById('edit-pw').value = ''; // 비밀번호 입력창은 항상 비워둠

            // 기존 데이터들을 모달 창 입력란에 뿌려줌 (null 방어)
            document.getElementById('edit-birth').value = birth && birth !== 'null' ? birth : '';
            document.getElementById('edit-school').value = school && school !== 'null' ? school : '';
            document.getElementById('edit-grade').value = grade && grade !== 'null' ? grade : '';
            document.getElementById('edit-phone').value = phone && phone !== 'null' ? phone : '';

            document.getElementById('edit-modal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        document.getElementById('edit-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('edit-user-id').value;

            const payload = {
                password: document.getElementById('edit-pw').value,
                birth_date: document.getElementById('edit-birth').value,
                school_name: document.getElementById('edit-school').value,
                grade: document.getElementById('edit-grade').value,
                phone_number: document.getElementById('edit-phone').value
            };

            const res = await fetch(`${API_BASE_URL}/admin/users/${userId}/info`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('회원정보가 성공적으로 덮어씌워졌습니다.');
                closeEditModal();
                fetchUsers(); // 수정한 내용을 테이블에 즉시 반영
            } else {
                const data = await res.json();
                alert(`수정 실패: ${data.detail || '알 수 없는 오류'}`);
            }
        });

        // --- 문제 추가 로직 ---
        function addTestCaseSlot() {
            const tcHtml = `
                <div class="testcase-group">
                    <div class="form-group">
                        <label>입력값 (Input)</label>
                        <textarea class="tc-in" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>기대 출력값 (Output)</label>
                        <textarea class="tc-out" rows="2"></textarea>
                    </div>
                </div>
            `;
            document.getElementById('testcases-container').insertAdjacentHTML('beforeend', tcHtml);
        }

        document.getElementById('problem-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // TC 스크래핑
            const tcIns = document.querySelectorAll('.tc-in');
            const tcOuts = document.querySelectorAll('.tc-out');
            const testCases = [];
            for (let i = 0; i < tcIns.length; i++) {
                if (tcIns[i].value.trim() !== '' && tcOuts[i].value.trim() !== '') {
                    testCases.push({
                        input_data: tcIns[i].value.trim(),
                        expected_output: tcOuts[i].value.trim()
                    });
                }
            }

            if (testCases.length === 0) {
                alert("최소 1개의 테스트 케이스 세트(입/출력)를 제대로 작성해주세요!");
                return;
            }

            const payload = {
                title: document.getElementById('p-title').value,
                description: document.getElementById('p-desc').value,
                difficulty: parseInt(document.getElementById('p-diff').value),
                time_limit: parseFloat(document.getElementById('p-time').value),
                memory_limit: parseInt(document.getElementById('p-memory').value),
                examples: testCases
            };

            const msgBox = document.getElementById('p-msg');
            msgBox.innerHTML = '<span style="color:var(--text-muted)">클라우드 DB에 추가하는 중...</span>';

            try {
                const res = await fetch(`${API_BASE_URL}/admin/problems`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    msgBox.innerHTML = '<span style="color:var(--success)">문제 발매 완료! ✅</span>';
                    document.getElementById('problem-form').reset();
                } else {
                    msgBox.innerHTML = '<span style="color:var(--error)">등록 실패</span>';
                }
            } catch (err) {
                msgBox.innerHTML = `<span style="color:var(--error)">서버 오류: ${err.message}</span>`;
            }
        });

        // 초기 시작
        document.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>

</html>
