<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고리즘 훈련장 - 회원 관리 (어드민)</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-header: #333333;
            --text-main: #d4d4d4;
            --text-muted: #858585;
            --border-color: #3e3e42;
            --accent-color: #9C27B0;
            /* 관리자 퍼플 */
            --accent-hover: #ba3dd1;
            --success: #89d185;
            --error: #f48771;
            --nav-bg: #444444;
            --nav-hover: #555555;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        header {
            background-color: var(--bg-header);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header-title {
            font-weight: bold;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
        }

        .admin-nav {
            display: flex;
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 0 30px;
        }

        .admin-nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 15px 20px;
            font-weight: bold;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .admin-nav a:hover {
            color: white;
            background-color: var(--nav-bg);
        }

        .admin-nav a.active {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
            background-color: rgba(156, 39, 176, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            /* 12단계 분리: 단일 컬럼으로 넓게 사용 */
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .panel {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        h2 {
            margin-top: 0;
            color: white;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        select,
        input,
        textarea,
        button {
            background-color: var(--bg-dark);
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 4px;
        }

        button {
            background-color: var(--accent-color);
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 8px 16px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            box-sizing: border-box;
        }

        /* [29단계] 스마트폰 대응: 관리자 헤더, 탭 메뉴 및 모달 너비 스와이프 보호 */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                padding: 15px;
            }
            .admin-nav {
                overflow-x: auto;
                white-space: nowrap;
                padding: 0 10px;
            }
            .admin-nav a {
                padding: 10px;
                font-size: 0.9rem;
            }
            .container {
                padding: 0 10px;
                margin: 15px auto;
            }
            /* 모달 창이 모바일 화면 너비를 비집고 나가지 않게 */
            .modal-content {
                width: 90% !important;
                margin: 15% auto !important;
                padding: 15px !important;
            }
        }

        /* [34단계] 페이지네이션 */
        .pagination { display:flex; justify-content:center; gap:5px; margin-top:15px; flex-wrap:wrap; }
        .page-btn { padding:5px 10px; background:var(--bg-panel); color:var(--text-main); border:1px solid var(--border-color); border-radius:4px; cursor:pointer; font-size:0.85rem; }
        .page-btn:hover { background:#3a3a3d; }
        .page-btn.active { background:var(--accent-color); color:white; border-color:var(--accent-color); }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="header-title">👨‍💻 알고리즘 훈련장 <span
                style="font-size: 0.6em; color: var(--accent-color);">[접근 통제소]</span></a>
        <div style="margin-left: auto;">
            <button onclick="window.location.href='index.html'"
                style="background:transparent; border:1px solid #666;">홈으로 가기</button>
        </div>
    </header>

    <!-- 13단계 세 갈래 네비게이션 탭 -->
    <div class="admin-nav">
        <a href="admin_users.html" class="active">👥 회원 관리</a>
        <a href="admin_problems.html">📝 새 문제 출제</a>
        <a href="admin_problems_list.html">🛠️ 등록된 문제 관리</a>
    </div>

    <div class="container">
        <!-- 메인 패널: 유저 등급 및 정보 관리 -->
        <div class="panel">
            <h2>👥 사용자 목록 및 등급(Role) 통제</h2>
            <table id="users-table">
                <thead>
                    <tr>
                        <th width="5%">ID</th>
                        <th width="20%">계정/닉네임</th>
                        <th width="30%">상세 인적사항</th>
                        <th width="15%">현재 등급</th>
                        <th width="15%">등급 변경</th>
                        <th width="15%">정보 개입</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <!-- 유저 목록 렌더링 -->
                </tbody>
            </table>
            <!-- [34단계] 페이지네이션 영역 -->
            <div class="pagination" id="user-pagination"></div>
        </div>
    </div>

    <!-- 관리자용 회원정보 강제 수정 모달 -->
    <div id="edit-modal" class="modal"
        style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.7);">
        <div class="modal-content"
            style="background-color: var(--bg-panel); margin: 7% auto; padding: 25px; border: 1px solid var(--border-color); width: 450px; border-radius: 8px;">
            <h2 style="margin-top: 0;">🛠️ 회원정보 강제 수정</h2>
            <p id="edit-username-display"
                style="color: var(--accent-color); font-weight: bold; margin-bottom: 20px; font-size: 1.1rem;"></p>
            <form id="edit-user-form">
                <input type="hidden" id="edit-user-id">

                <div class="form-group">
                    <label>새로운 비밀번호 <span style="color:var(--error); font-size:0.8rem;">(입력 시 덮어쓰기 됨)</span></label>
                    <input type="password" id="edit-pw" placeholder="변경할 경우에만 입력 (기존 유지 시 빈칸)">
                </div>

                <hr style="border: 0; border-top: 1px dotted var(--border-color); margin: 15px 0;">

                <div class="form-group">
                    <label>닉네임 (표시 이름)</label>
                    <input type="text" id="edit-nickname" required>
                </div>
                <div class="form-group">
                    <label>생년월일</label>
                    <input type="text" id="edit-birth" placeholder="예) 20100512">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 2;">
                        <label>소속 학교</label>
                        <input type="text" id="edit-school" placeholder="예) 구미중학교">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>학년</label>
                        <input type="text" id="edit-grade" placeholder="예) 3학년">
                    </div>
                </div>
                <div class="form-group">
                    <label>전화번호</label>
                    <input type="text" id="edit-phone" placeholder="예) 010-1234-5678">
                </div>

                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="submit" style="flex: 1; font-size: 1.05rem;">수정 내용 덮어쓰기</button>
                    <button type="button" onclick="closeEditModal()"
                        style="flex: 1; background-color: transparent; border: 1px solid #777;">취소</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 회원 풀이 이력 열람 모달 (19단계 신설) -->
    <div id="history-modal" class="modal"
        style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.7);">
        <div class="modal-content"
            style="background-color: var(--bg-panel); margin: 5% auto; padding: 25px; border: 1px solid var(--border-color); width: 650px; border-radius: 8px;">
            <h2 style="margin-top: 0;">📊 회원 상세 풀이 추적</h2>
            <p id="history-username-display"
                style="color: var(--accent-color); font-weight: bold; margin-bottom: 20px; font-size: 1.1rem;"></p>

            <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                <thead>
                    <tr>
                        <th width="15%">문제</th>
                        <th width="40%">제목</th>
                        <th width="20%">사용 언어</th>
                        <th width="25%">성공 / 통과율</th>
                    </tr>
                </thead>
                <tbody id="history-tbody">
                    <!-- 풀이 기록 렌더링 -->
                </tbody>
            </table>

            <div style="margin-top: 25px; text-align: center;">
                <button type="button" onclick="closeHistoryModal()"
                    style="background-color: transparent; border: 1px solid #777; width: 150px;">닫기</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';

        // 보안 리다이렉트
        if (localStorage.getItem('role') !== 'admin') {
            alert('관리자 권한이 필요합니다!');
            window.location.href = 'index.html';
        }

        // [34단계] 페이지네이션 상태
        let userCurrentPage = 1;
        const USER_PER_PAGE = 10;

        // --- 사용자 목록 불러오기 (10개 페이지네이션) ---
        async function fetchUsers() {
            const res = await fetch(`${API_BASE_URL}/admin/users`);
            const data = await res.json();
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '';

            const allUsers = data.users;
            if (allUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:grey;">등록된 회원이 없습니다.</td></tr>';
                document.getElementById('user-pagination').innerHTML = '';
                return;
            }

            // 페이지네이션 계산
            const totalPages = Math.ceil(allUsers.length / USER_PER_PAGE);
            if (userCurrentPage > totalPages) userCurrentPage = totalPages;
            const startIdx = (userCurrentPage - 1) * USER_PER_PAGE;
            const pageUsers = allUsers.slice(startIdx, startIdx + USER_PER_PAGE);

            pageUsers.forEach(u => {
                const statusHtml = `
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <button onclick="changeStatus(${u.id}, 1)" style="flex:1; padding:4px; font-size:0.8rem; ${u.is_active ? 'background-color:var(--success); color:black;' : 'background-color:transparent; border:1px solid #777;'}">승인 O</button>
                        <button onclick="changeStatus(${u.id}, 0)" style="flex:1; padding:4px; font-size:0.8rem; ${!u.is_active ? 'background-color:var(--error); color:black;' : 'background-color:transparent; border:1px solid #777;'}">정지 됨</button>
                    </div>
                `;

                tbody.innerHTML += `
                    <tr>
                        <td>${u.id}</td>
                        <td>
                            <strong>${u.nickname}</strong><br>
                            <small style="color:var(--text-muted)">${u.username}</small>
                            ${statusHtml}
                        </td>
                        <td style="font-size: 0.85rem; color: var(--text-muted);">
                            🏫 ${u.school_name || '-'}(${u.grade || '-'})<br>
                            📞 ${u.phone_number || '-'}<br>
                            🎂 ${u.birth_date || '-'}
                        </td>
                        <td>
                            <span style="display:inline-block; padding:3px 8px; border-radius:4px; background-color:var(--nav-bg); font-weight:bold; font-size:0.9rem;">
                                ${u.role === 'admin' ? '👑 관리자' :
                        u.role === 'level_1_adv' ? '🥇 1급(고급)' :
                            u.role === 'level_1' ? '🥇 1급(기본)' :
                                u.role === 'level_2_adv' ? '🥈 2급(고급)' :
                                    u.role === 'level_2' ? '🥈 2급(기본)' :
                                        u.role === 'level_3_adv' ? '🥉 3급(고급)' :
                                            '🥉 3급(기본)'}
                            </span>
                        </td>
                        <td>
                            <select onchange="changeRole(${u.id}, this.value)" style="width:130px;">
                                <option value="level_3" ${u.role === 'level_3' ? 'selected' : ''}>🥉 3급(기본)</option>
                                <option value="level_3_adv" ${u.role === 'level_3_adv' ? 'selected' : ''}>🥉 3급(고급)</option>
                                <option value="level_2" ${u.role === 'level_2' ? 'selected' : ''}>🥈 2급(기본)</option>
                                <option value="level_2_adv" ${u.role === 'level_2_adv' ? 'selected' : ''}>🥈 2급(고급)</option>
                                <option value="level_1" ${u.role === 'level_1' ? 'selected' : ''}>🥇 1급(기본)</option>
                                <option value="level_1_adv" ${u.role === 'level_1_adv' ? 'selected' : ''}>🥇 1급(고급)</option>
                                <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>👑 관리자</option>
                            </select>
                        </td>
                        <td>
                            <div style="display:flex; flex-direction:column; gap:5px;">
                                <button onclick="openEditModal(${u.id}, '${u.username}', '${u.nickname}', '${u.birth_date}', '${u.school_name}', '${u.grade}', '${u.phone_number}')" style="background-color: #2196F3; font-size: 0.8rem; padding: 6px 12px; border-radius: 4px;">✏️ 수정</button>
                                <button onclick="openHistoryModal(${u.id}, '${u.nickname}')" style="background-color: var(--accent-color); font-size: 0.8rem; padding: 6px 12px; border-radius: 4px;">📊 풀이 기록</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            // 페이지네이션 버튼 렌더링
            renderUserPagination(totalPages);
        }

        // [34단계] 페이지네이션 버튼 그리기
        function renderUserPagination(totalPages) {
            const container = document.getElementById('user-pagination');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            let html = '';
            html += `<span class="page-btn" onclick="goToUserPage(${userCurrentPage - 1})" ${userCurrentPage === 1 ? 'style="opacity:0.4;pointer-events:none;"' : ''}>◀ 이전</span>`;
            for (let i = 1; i <= totalPages; i++) {
                html += `<span class="page-btn ${i === userCurrentPage ? 'active' : ''}" onclick="goToUserPage(${i})">${i}</span>`;
            }
            html += `<span class="page-btn" onclick="goToUserPage(${userCurrentPage + 1})" ${userCurrentPage === totalPages ? 'style="opacity:0.4;pointer-events:none;"' : ''}>다음 ▶</span>`;
            container.innerHTML = html;
        }

        function goToUserPage(page) {
            if (page < 1) return;
            userCurrentPage = page;
            fetchUsers();
        }

        // 등급 변경
        async function changeRole(userId, newRole) {
            if (!confirm(`사용자의 권한을 [${newRole}]로 변경하시겠습니까?`)) {
                fetchUsers();
                return;
            }
            const res = await fetch(`${API_BASE_URL}/admin/users/${userId}/role`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: newRole })
            });
            if (res.ok) fetchUsers();
            else alert('등급 변경에 실패했습니다.');
        }

        // 상태 변경
        async function changeStatus(userId, isActiveNumber) {
            const res = await fetch(`${API_BASE_URL}/admin/users/${userId}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_active: isActiveNumber })
            });
            if (res.ok) fetchUsers();
            else alert('상태 변경에 실패했습니다.');
        }

        // 정보 수정 모달 제어
        function openEditModal(id, username, nickname, birth, school, grade, phone) {
            document.getElementById('edit-user-id').value = id;
            document.getElementById('edit-username-display').innerText = `대상 계정: [ ${username} ]`;
            document.getElementById('edit-pw').value = '';
            document.getElementById('edit-nickname').value = nickname && nickname !== 'null' ? nickname : '';

            document.getElementById('edit-birth').value = birth && birth !== 'null' ? birth : '';
            document.getElementById('edit-school').value = school && school !== 'null' ? school : '';
            document.getElementById('edit-grade').value = grade && grade !== 'null' ? grade : '';
            document.getElementById('edit-phone').value = phone && phone !== 'null' ? phone : '';

            document.getElementById('edit-modal').style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        // 특정 학생 풀이 내역 모달 제어 (19단계)
        async function openHistoryModal(userId, nickname) {
            document.getElementById('history-username-display').innerText = `대상 훈련원: [ ${nickname} ]`;
            const tbody = document.getElementById('history-tbody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">서버에서 기록을 가져비는 중...</td></tr>';
            document.getElementById('history-modal').style.display = 'block';

            try {
                const res = await fetch(`${API_BASE_URL}/admin/users/${userId}/history`);
                const data = await res.json();

                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">아직 아무런 문제도 시도하지 않았습니다.</td></tr>';
                    return;
                }

                data.forEach(h => {
                    const langBadge = h.language === 'python3' ? '🐍 파이썬' : '☕ 자바';
                    const successColor = h.ac_cnt > 0 ? 'var(--success)' : 'var(--error)';
                    const fw = h.ac_cnt > 0 ? 'bold' : 'normal';

                    tbody.innerHTML += `
                        <tr>
                            <td style="color:var(--text-muted); font-weight:bold;"># ${h.display_id}</td>
                            <td style="font-weight:bold;">${h.title}</td>
                            <td>${langBadge}</td>
                            <td style="color:${successColor}; font-weight:${fw};">
                                성공 ${h.ac_cnt}회 / 시도 ${h.total_cnt}회
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--error);">통신 중 오류가 발생했습니다.</td></tr>`;
            }
        }

        function closeHistoryModal() {
            document.getElementById('history-modal').style.display = 'none';
        }

        document.getElementById('edit-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('edit-user-id').value;

            const payload = {
                password: document.getElementById('edit-pw').value,
                nickname: document.getElementById('edit-nickname').value,
                birth_date: document.getElementById('edit-birth').value,
                school_name: document.getElementById('edit-school').value,
                grade: document.getElementById('edit-grade').value,
                phone_number: document.getElementById('edit-phone').value
            };

            const res = await fetch(`${API_BASE_URL}/admin/users/${userId}/info`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('회원정보가 성공적으로 덮어씌워졌습니다.');
                closeEditModal();
                fetchUsers();
            } else {
                const data = await res.json();
                alert(`수정 실패: ${data.detail || '알 수 없는 오류'}`);
            }
        });

        // 초기 시작
        document.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>

</html>
