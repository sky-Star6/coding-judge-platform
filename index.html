<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고리즘 훈련장 - 홈</title>
    <style>
        /* [기본 스타일 및 색상] */
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-header: #333333;
            --text-main: #d4d4d4;
            --text-muted: #858585;
            --border-color: #3e3e42;
            --accent-color: #007acc;
            --accent-hover: #0098ff;
            --success: #89d185;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* [상단 네비게이션 헤더] */
        header {
            height: 60px;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header-title {
            font-weight: bold;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
            /* 클릭 가능하도록 a 태그 대비 */
        }

        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-main);
            font-weight: bold;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background-color: var(--border-color);
            color: white;
        }

        /* [메인 컨텐츠 영역] */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: white;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* [필터(난이도/진도 선택) 구역] */
        .filter-section {
            background-color: var(--bg-panel);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .filter-label {
            font-weight: bold;
            color: var(--text-muted);
        }

        select,
        button {
            background-color: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            transition: 0.2s;
            font-weight: bold;
            border: none;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* [문제 목록 리스트 스타일] */
        .problem-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .problem-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .problem-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            border-color: var(--accent-color);
        }

        .problem-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            color: white;
        }

        .problem-tags {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
        }

        /* 뱃지(태그) 디자인 */
        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            background-color: #333;
            color: #ddd;
        }

        .badge-diff-1 {
            background-color: #4CAF50;
            color: white;
        }

        /* 쉬움 초록 */
        .badge-diff-2 {
            background-color: #FF9800;
            color: white;
        }

        /* 보통 주황 */
        .badge-diff-3 {
            background-color: #F44336;
            color: white;
        }

        /* 어려움 빨강 */

        .badge-solved {
            background-color: var(--success);
            color: white;
            font-weight: bold;
        }

        .solve-btn {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        .problem-card:hover .solve-btn {
            background-color: var(--accent-color);
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="header-title">👨‍💻 알고리즘 훈련장</a>
        <div class="user-info">
            <span id="nav-nickname"></span>님 환영합니다!
            <button onclick="logout()" class="logout-btn">로그아웃</button>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">문제 목록</h1>

        <!-- 난이도 등 필터 영역 -->
        <div class="filter-section">
            <span class="filter-label">⚙️ 필터:</span>
            <select id="diff-filter">
                <option value="all">모든 난이도 보기</option>
                <option value="1">Lv. 1 (초급)</option>
                <option value="2">Lv. 2 (중급)</option>
                <option value="3">Lv. 3 (고급)</option>
            </select>
            <!-- 진도별 메뉴 등 다른 필터도 여기에 추가 가능 -->
            <button onclick="fetchProblems()">적용하기</button>
        </div>

        <!-- 문제가 동적으로 표시될 구역 -->
        <div class="problem-list" id="problem-list-container">
            <div style="text-align:center; padding: 40px; color: var(--text-muted);">
                서버에서 문제 목록을 불러오는 중입니다... ⏳
            </div>
        </div>
    </div>

    <script>
        // 백엔드 API 주소 (동일한 도메인이므로 상대 경로를 사용합니다)
        const API_BASE_URL = '/api';

        // --- 1. 로그인 여부 즉시 검증 ---
        const userId = localStorage.getItem('user_id');
        const nickname = localStorage.getItem('nickname');

        if (!userId) {
            // 저장된 로그인 정보가 없으면 인증 창으로 곧장 튕겨냅니다.
            window.location.href = 'auth.html';
        }

        // 헤더 닉네임 교체
        document.getElementById('nav-nickname').textContent = nickname;

        // 로그아웃 기믹
        function logout() {
            localStorage.clear();
            window.location.href = 'auth.html';
        }

        // 2. 페이지가 로딩되자마자 서버에서 문제 목록을 가져옴
        document.addEventListener('DOMContentLoaded', () => {
            fetchProblems();
        });

        // 2. 서버에 저장된 문제 목록(problems)을 요청하여 화면에 카드 형태로 그리는 함수
        async function fetchProblems() {
            const container = document.getElementById('problem-list-container');
            const diffFilter = document.getElementById('diff-filter').value;

            try {
                // Flask 백엔드 경로로 정확히 요청. 로그인한 내 user_id를 포함시켜 넘긴다.
                const response = await fetch(`${API_BASE_URL}/problems?user_id=${userId}`);
                if (!response.ok) throw new Error("서버 연동 실패: " + response.statusText);

                const data = await response.json();
                container.innerHTML = ''; // 기존 내용 지우기

                // 받아온 문제 데이터 중, 난이도 필터 조건에 맞는 것들만 걸러냅니다.
                const filteredProblems = data.problems.filter(p => {
                    if (diffFilter === 'all') return true;
                    // 난이도가 숫자 형태(1, 2)일 수 있으므로 문자열로 변환 후 비교
                    return String(p.difficulty) === diffFilter;
                });

                if (filteredProblems.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding: 40px; color: #888;">조건에 맞는 문제가 없습니다.</div>';
                    return;
                }

                // 걸러진 문제들을 하나씩 화면 카드(HTML 태그) 형태로 조립합니다.
                filteredProblems.forEach(p => {
                    // 실제 링크: judge.html 페이지로 이동하면서 URL 뒤에 ?id=숫자 를 달고 갑니다.
                    const linkUrl = `judge.html?id=${p.id}`;
                    const diffBadgeClass = `badge-diff-${p.difficulty}`; // 예: badge-diff-1

                    let solvedBadgeHtml = '';
                    if (p.is_solved) {
                        solvedBadgeHtml = `<span class="badge badge-solved">✅ 해결 완료</span>`;
                    }

                    const cardHtml = `
                        <a href="${linkUrl}" class="problem-card">
                            <div class="problem-info">
                                <h3>[문제 ${p.id}] ${p.title}</h3>
                                <div class="problem-tags">
                                    <span class="badge ${diffBadgeClass}">Level ${p.difficulty}</span>
                                    <span class="badge">도전 가능</span>
                                    ${solvedBadgeHtml}
                                </div>
                            </div>
                            <button class="solve-btn">문제 풀기 ➔</button>
                        </a>
                    `;
                    container.innerHTML += cardHtml;
                });

            } catch (error) {
                container.innerHTML = `<div style="text-align:center; padding: 40px; color: #f48771;">
                    <strong>[오류] 문제 목록을 불러오지 못했습니다.</strong><br><br>
                    백엔드 서버(Flask)와 통신이 끊어졌거나 API 주소가 다릅니다.<br>
                    개발자 도구(F12)의 Console을 확인해주세요. (${error.message})
                </div>`;
            }
        }
    </script>
</body>

</html>
