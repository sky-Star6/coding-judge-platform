<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고리즘 훈련장 - 홈</title>
    <style>
        /* [기본 스타일 및 색상] */
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-header: #333333;
            --text-main: #d4d4d4;
            --text-muted: #858585;
            --border-color: #3e3e42;
            --accent-color: #007acc;
            --accent-hover: #0098ff;
            --success: #89d185;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        /* [상단 네비게이션 헤더] */
        header {
            height: 60px;
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header-title {
            font-weight: bold;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
            /* 클릭 가능하도록 a 태그 대비 */
        }

        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-main);
            font-weight: bold;
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background-color: var(--border-color);
            color: white;
        }

        /* [메인 컨텐츠 영역] */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .main-content {
            display: flex;
            flex-direction: column;
        }

        /* [사이드바 랭킹 영역] */
        .sidebar {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .ranking-title {
            font-size: 1.2rem;
            color: white;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #333;
        }

        .ranking-item:last-child {
            border-bottom: none;
        }

        .rank-number {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-color);
            width: 30px;
        }

        .rank-nickname {
            flex-grow: 1;
            font-weight: bold;
            color: var(--text-main);
        }

        .rank-score {
            color: var(--success);
            font-weight: bold;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 30px;
            color: white;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* [필터(난이도/진도 선택) 구역] */
        .filter-section {
            background-color: var(--bg-panel);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .filter-label {
            font-weight: bold;
            color: var(--text-muted);
        }

        select,
        button {
            background-color: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            transition: 0.2s;
            font-weight: bold;
            border: none;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* [문제 목록 리스트 스타일] */
        .problem-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .problem-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .problem-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            border-color: var(--accent-color);
        }

        .problem-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            color: white;
        }

        .problem-tags {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
        }

        /* 뱃지(태그) 디자인 */
        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            background-color: #333;
            color: #ddd;
        }

        /* 기초문제 */
        .badge-diff-0 {
            background-color: #607D8B;
            color: white;
        }

        /* 3급 기본 초록 */
        .badge-diff-1 {
            background-color: #4CAF50;
            color: white;
        }

        /* 3급 고급 진초록 */
        .badge-diff-2 {
            background-color: #388E3C;
            color: white;
        }

        /* 2급 기본 주황 */
        .badge-diff-3 {
            background-color: #FF9800;
            color: white;
        }

        /* 2급 고급 진주황 */
        .badge-diff-4 {
            background-color: #F57C00;
            color: white;
        }

        /* 1급 기본 빨강 */
        .badge-diff-5 {
            background-color: #F44336;
            color: white;
        }

        /* 1급 고급 진빨강 */
        .badge-diff-6 {
            background-color: #D32F2F;
            color: white;
        }

        .badge-solved {
            background-color: var(--success);
            color: white;
            font-weight: bold;
        }

        .solve-btn {
            background-color: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        .problem-card:hover .solve-btn {
            background-color: var(--accent-color);
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html" class="header-title">👨‍💻 알고리즘 훈련장</a>
        <div class="user-info">
            <span id="nav-nickname"></span>님 환영합니다!
            <button onclick="logout()" class="logout-btn">로그아웃</button>
        </div>
    </header>

    <div class="container">
        <!-- 좌측: 문제 목록 -->
        <div class="main-content">
            <h1 class="page-title">모든 문제 📚</h1>

            <div class="filter-section">
                <span class="filter-label">난이도로 찾기:</span>
                <select id="diff-filter">
                    <option value="all">전체 난이도</option>
                    <option value="0">기초문제</option>
                    <option value="1">3급테스트 (기본)</option>
                    <option value="2">3급테스트 (고급) [전용]</option>
                    <option value="3">2급테스트 (기본)</option>
                    <option value="4">2급테스트 (고급) [전용]</option>
                    <option value="5">1급테스트 (기본)</option>
                    <option value="6">1급테스트 (고급) [전용]</option>
                </select>
                <button onclick="fetchProblems()">검색</button>
            </div>

            <div class="problem-list" id="problem-list-container">
                <div style="text-align: center; color: #888; padding: 40px;">서버와 통신 중입니다...</div>
            </div>
        </div>

        <!-- 우측: 명예의 전당 (리더보드) -->
        <div class="sidebar">
            <h2 class="ranking-title">
                <span>🏆 명예의 전당</span>
                <button onclick="fetchRanking()"
                    style="padding: 2px 6px; font-size: 0.8rem; border-radius: 4px;">새로고침</button>
            </h2>
            <ul class="ranking-list" id="ranking-container">
                <div style="text-align: center; color: #888; padding: 20px;">랭킹 로딩 중...</div>
            </ul>
        </div>
    </div>

    <script>
        // 백엔드 API 주소 (동일한 도메인이므로 상대 경로를 사용합니다)
        const API_BASE_URL = '/api';

        // --- 1. 로그인 여부 즉시 검증 ---
        const userId = localStorage.getItem('user_id');
        const nickname = localStorage.getItem('nickname');
        const userRole = localStorage.getItem('role') || 'level_3';

        if (!userId) {
            // 저장된 로그인 정보가 없으면 인증 창으로 곧장 튕겨냅니다.
            window.location.href = 'auth.html';
        }

        // 등급을 한글 및 색상 뱃지로 바꿔주는 함수
        function getRoleBadgeHtml(role) {
            if (role === 'admin') return '<span class="badge" style="background-color: #9C27B0; color: white;">👑 관리자</span>';
            if (role === 'level_1_adv') return '<span class="badge badge-diff-6">🥇 1급 (고급)</span>';
            if (role === 'level_1') return '<span class="badge badge-diff-5">🥇 1급 (기본)</span>';
            if (role === 'level_2_adv') return '<span class="badge badge-diff-4">🥈 2급 (고급)</span>';
            if (role === 'level_2') return '<span class="badge badge-diff-3">🥈 2급 (기본)</span>';
            if (role === 'level_3_adv') return '<span class="badge badge-diff-2">🥉 3급 (고급)</span>';
            return '<span class="badge badge-diff-1">🥉 3급 (기본)</span>';
        }

        // 숫자 난이도를 한글 텍스트로 치환해주는 함수
        function getDifficultyName(diffCode) {
            const diffMap = {
                0: '기초문제',
                1: '3급테스트 (기본)',
                2: '3급테스트 (고급)',
                3: '2급테스트 (기본)',
                4: '2급테스트 (고급)',
                5: '1급테스트 (기본)',
                6: '1급테스트 (고급)'
            };
            return diffMap[parseInt(diffCode)] || `Level ${diffCode}`;
        }

        // 헤더 닉네임 교체 및 내 등급 뱃지 표시
        document.getElementById('nav-nickname').innerHTML = `${nickname} ${getRoleBadgeHtml(userRole)}`;

        if (userRole === 'admin') {
            document.querySelector('.user-info').insertAdjacentHTML('afterbegin', '<button onclick="window.location.href=\'admin_users.html\'" style="background:#9C27B0; border:none; color:white; padding:4px 10px; border-radius:4px; margin-right:10px; cursor:pointer;">통제소 열기 ⚙️</button>');
        }

        // 로그아웃 기믹
        function logout() {
            localStorage.clear();
            window.location.href = 'auth.html';
        }

        // 2. 페이지가 로딩되자마자 서버에서 문제 목록 & 랭킹을 가져옴
        document.addEventListener('DOMContentLoaded', () => {
            fetchProblems();
            fetchRanking();
        });

        // 2. 서버에 저장된 문제 목록(problems)을 요청하여 화면에 카드 형태로 그리는 함수
        async function fetchProblems() {
            const container = document.getElementById('problem-list-container');
            const diffFilter = document.getElementById('diff-filter').value;

            try {
                // Flask 백엔드 경로로 정확히 요청. 로그인한 내 user_id를 포함시켜 넘긴다.
                const response = await fetch(`${API_BASE_URL}/problems?user_id=${userId}`);
                if (!response.ok) throw new Error("서버 연동 실패: " + response.statusText);

                const data = await response.json();
                container.innerHTML = ''; // 기존 내용 지우기

                // 받아온 문제 데이터 중, 난이도 필터 조건에 맞는 것들만 걸러냅니다.
                const filteredProblems = data.problems.filter(p => {
                    if (diffFilter === 'all') return true;
                    // 난이도가 숫자 형태(1, 2)일 수 있으므로 문자열로 변환 후 비교
                    return String(p.difficulty) === diffFilter;
                });

                if (filteredProblems.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding: 40px; color: #888;">조건에 맞는 문제가 없습니다.</div>';
                    return;
                }

                // 걸러진 문제들을 하나씩 화면 카드(HTML 태그) 형태로 조립합니다.
                filteredProblems.forEach(p => {
                    let isLocked = true;
                    let dif = parseInt(p.difficulty);

                    if (userRole === 'admin' || dif === 0) {
                        isLocked = false;
                    } else if (dif === 1) {
                        // 3급 기본: 3급 이상 전부 허용 (고급 포함)
                        if (['level_3', 'level_3_adv', 'level_2', 'level_2_adv', 'level_1', 'level_1_adv'].includes(userRole)) isLocked = false;
                    } else if (dif === 2) {
                        // 3급 고급: 오직 3급 고급 사용자만
                        if (userRole === 'level_3_adv') isLocked = false;
                    } else if (dif === 3) {
                        // 2급 기본: 2급 이상 전부 허용
                        if (['level_2', 'level_2_adv', 'level_1', 'level_1_adv'].includes(userRole)) isLocked = false;
                    } else if (dif === 4) {
                        // 2급 고급: 오직 2급 고급만
                        if (userRole === 'level_2_adv') isLocked = false;
                    } else if (dif === 5) {
                        // 1급 기본: 1급 이상
                        if (['level_1', 'level_1_adv'].includes(userRole)) isLocked = false;
                    } else if (dif === 6) {
                        // 1급 고급: 오직 1급 고급만
                        if (userRole === 'level_1_adv') isLocked = false;
                    }

                    const linkUrl = isLocked ? '#' : `judge.html?id=${p.id}`;
                    const diffBadgeClass = `badge-diff-${p.difficulty}`;

                    let typeBadgeHtml = '';
                    if (p.problem_type === 'blank') {
                        typeBadgeHtml = `<span class="badge" style="background-color:#ff9800; color:#fff; border: 1px solid #e65100; margin-left: 5px;">🧩 빈칸 채우기</span>`;
                    } else if (p.problem_type === 'debugging') {
                        typeBadgeHtml = `<span class="badge" style="background-color:#f44336; color:#fff; border: 1px solid #b71c1c; margin-left: 5px;">🛠️ 디버깅</span>`;
                    } else {
                        typeBadgeHtml = `<span class="badge" style="background-color:#555; color:#fff; margin-left: 5px;">💻 코드 작성</span>`;
                    }

                    let solvedBadgeHtml = '';
                    if (p.is_solved_python) {
                        solvedBadgeHtml += `<span class="badge badge-solved" style="background-color: #3776ab; color: white; margin-right: 5px;">🐍 파이썬 해결 (${p.solve_count_python}회 완료)</span>`;
                    }
                    if (p.is_solved_java) {
                        solvedBadgeHtml += `<span class="badge badge-solved" style="background-color: #b07219; color: white;">☕ 자바 해결 (${p.solve_count_java}회 완료)</span>`;
                    }

                    let lockStatusHtml = isLocked
                        ? `<span class="badge" style="background-color:#555; color:white;">🔒 잠김 (승급 필요)</span>`
                        : `<span class="badge">도전 가능</span>`;

                    let buttonHtml = isLocked
                        ? `<button class="solve-btn" style="border-color:#555; color:#555; cursor:not-allowed;" disabled>잠김 🔒</button>`
                        : `<button class="solve-btn">문제 풀기 ➔</button>`;

                    // 마우스 호버 등 클릭 차단용 스타일 추가
                    const cardStyle = isLocked ? `style="opacity: 0.6; cursor: not-allowed; pointer-events: none;"` : '';

                    const cardHtml = `
                        <a href="${linkUrl}" class="problem-card" ${cardStyle}>
                            <div class="problem-info">
                                <h3>[문제 ${p.display_id}] ${p.title}</h3>
                                <div class="problem-tags">
                                <span class="badge ${diffBadgeClass}">${getDifficultyName(dif)}</span>
                                ${typeBadgeHtml}
                                ${lockStatusHtml}
                            </div>
                            <div class="problem-tags" style="margin-top: 10px;">
                                ${solvedBadgeHtml}
                            </div>
                            </div>
                            ${buttonHtml}
                        </a>
                    `;
                    container.innerHTML += cardHtml;
                });

            } catch (error) {
                container.innerHTML = `<div style="text-align:center; padding: 40px; color: #f48771;">
                    <strong>[오류] 문제 목록을 불러오지 못했습니다.</strong><br><br>
                    백엔드 서버(Flask)와 통신이 끊어졌거나 API 주소가 다릅니다.<br>
                    개발자 도구(F12)의 Console을 확인해주세요. (${error.message})
                </div>`;
            }
        }

        // --- 3. 랭킹보드 가져오기 ---
        async function fetchRanking() {
            const container = document.getElementById('ranking-container');
            try {
                const response = await fetch(`${API_BASE_URL}/ranking`);
                if (!response.ok) throw new Error("랭킹 서버 연동 실패");

                const data = await response.json();
                container.innerHTML = '';

                if (data.ranking.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">아직 풀이를 완료한<br>사용자가 없습니다.</div>';
                    return;
                }

                data.ranking.forEach((r, idx) => {
                    let rankIcon = `${idx + 1}`;
                    if (idx === 0) rankIcon = '🥇';
                    if (idx === 1) rankIcon = '🥈';
                    if (idx === 2) rankIcon = '🥉';

                    const itemHtml = `
                        <li class="ranking-item">
                            <div class="rank-number">${rankIcon}</div>
                            <div class="rank-nickname">
                                ${r.nickname} 
                                <span style="font-size:0.7em; font-weight:normal; color:#888;">${r.role === 'admin' ? '(Admin)' : ''}</span>
                            </div>
                            <div class="rank-score">${r.solved_count}문제</div>
                        </li>
                    `;
                    container.innerHTML += itemHtml;
                });

            } catch (error) {
                container.innerHTML = `<div style="text-align:center; padding: 20px; color: #f48771;">
                    <small>통신 오류</small>
                </div>`;
            }
        }
    </script>
</body>

</html>
