<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고리즘 훈련장 - 로그인</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --bg-header: #333333;
            --text-main: #d4d4d4;
            --text-muted: #858585;
            --border-color: #3e3e42;
            --accent-color: #007acc;
            --accent-hover: #0098ff;
            --error: #f48771;
            --success: #89d185;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 400px;
            padding: 40px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            color: white;
            margin: 0 0 10px 0;
        }

        .auth-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .toggle-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .toggle-text a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        #message-box {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .error-msg {
            color: var(--error);
        }

        .success-msg {
            color: var(--success);
        }
    </style>
</head>

<body>

    <div class="auth-container" id="login-box">
        <div class="auth-header">
            <h1>👨‍💻 로그인</h1>
            <p>알고리즘 훈련장에 오신 것을 환영합니다.</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label for="login-id">아이디</label>
                <input type="text" id="login-id" required placeholder="아이디를 입력하세요">
            </div>
            <div class="form-group">
                <label for="login-pw">비밀번호</label>
                <input type="password" id="login-pw" required placeholder="비밀번호를 입력하세요">
            </div>
            <button type="submit" class="submit-btn" id="login-btn-submit">로그인 시작하기</button>
        </form>
        <div id="login-msg" id="message-box"></div>
        <div class="toggle-text">
            훈련장 계정이 없으신가요? <a onclick="toggleMode('signup')">무료 회원가입</a><br><br>
            <a onclick="toggleMode('find')" style="font-size: 0.85rem; color: #aaa;">비밀번호를 잊으셨나요?</a>
        </div>
    </div>

    <!-- 회원가입 폼 (초기에는 숨김) -->
    <div class="auth-container" id="signup-box" style="display: none;">
        <div class="auth-header">
            <h1>🚀 회원가입</h1>
            <p>자신만의 코딩 기록을 저장해 보세요.</p>
        </div>
        <form id="signup-form">
            <div class="form-group">
                <label for="signup-id">사용할 아이디</label>
                <input type="text" id="signup-id" required placeholder="영어/숫자 입력">
            </div>
            <div class="form-group">
                <label for="signup-pw">비밀번호</label>
                <input type="password" id="signup-pw" required placeholder="비밀번호 입력">
            </div>
            <div class="form-group">
                <label for="signup-pw-confirm">비밀번호 확인</label>
                <input type="password" id="signup-pw-confirm" required placeholder="비밀번호를 다시 한 번 입력하세요">
            </div>
            <div class="form-group">
                <label for="signup-nick">닉네임</label>
                <input type="text" id="signup-nick" required placeholder="화면에 표시될 멋진 닉네임">
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px;">■ 학생 인적사항 (승인 및 비밀번호 찾기에
                사용됩니다)</p>

            <div class="form-group">
                <label for="signup-birth">생년월일</label>
                <input type="text" id="signup-birth" required placeholder="예) 20100512 (숫자 8자리)">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 2;">
                    <label for="signup-school">소속 학교</label>
                    <input type="text" id="signup-school" required placeholder="예) 구미중학교">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="signup-grade">학년</label>
                    <input type="text" id="signup-grade" required placeholder="예) 3학년">
                </div>
            </div>
            <div class="form-group">
                <label for="signup-phone">전화번호(연락처)</label>
                <input type="text" id="signup-phone" required placeholder="예) 010-1234-5678">
            </div>

            <button type="submit" class="submit-btn" style="background-color: #4CAF50;">가입하고 바로 시작하기</button>
        </form>
        <div id="signup-msg" id="message-box"></div>
        <div class="toggle-text">
            이미 계정이 있으신가요? <a onclick="toggleMode('login')">로그인 화면으로</a>
        </div>
    </div>

    <!-- 비밀번호 찾기 폼 (10단계 신설) -->
    <div class="auth-container" id="find-box" style="display: none;">
        <div class="auth-header">
            <h1>🔍 비밀번호 찾기</h1>
            <p>가입 시 입력했던 정보를 적어주세요.</p>
        </div>
        <form id="find-form">
            <div class="form-group">
                <label for="find-id">가입했던 아이디</label>
                <input type="text" id="find-id" required>
            </div>
            <div class="form-group">
                <label for="find-birth">생년월일</label>
                <input type="text" id="find-birth" required placeholder="예) 20100512">
            </div>
            <div class="form-group">
                <label for="find-phone">전화번호(연락처)</label>
                <input type="text" id="find-phone" required placeholder="예) 010-1234-5678">
            </div>
            <button type="submit" class="submit-btn" style="background-color: #FF9800;">내 비밀번호 찾기</button>
        </form>
        <div id="find-msg" id="message-box" style="margin-top: 15px; text-align: center;"></div>
        <div class="toggle-text">
            기억이 나셨나요? <a onclick="toggleMode('login')">로그인 화면으로</a>
        </div>
    </div>

    <script>
        // 현재 로그인 되어 있다면 자동으로 홈으로 튕겨냄
        if (localStorage.getItem('user_id')) {
            window.location.href = 'index.html';
        }

        const API_BASE_URL = '/api';

        let currentMode = 'login'; // 'login', 'signup', 'find'

        function toggleMode(mode) {
            currentMode = mode;
            document.getElementById('login-box').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('signup-box').style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById('find-box').style.display = mode === 'find' ? 'block' : 'none';

            // 모드 전환 시 오류 메시지 초기화
            document.getElementById('login-msg').innerHTML = '';
            document.getElementById('signup-msg').innerHTML = '';
            document.getElementById('find-msg').innerHTML = '';
        }

        // --- 로그인 처리 ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('login-msg');
            msgBox.innerHTML = '<span style="color: grey;">로그인 중...</span>';
            document.getElementById('login-btn-submit').disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('login-id').value,
                        password: document.getElementById('login-pw').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    // 로그인 성공 시 브라우저 내부 저장소(localStorage)에 인증 정보 기록
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('nickname', data.nickname);
                    localStorage.setItem('role', data.role);
                    msgBox.innerHTML = '<span class="success-msg">성공! 홈페이지로 이동합니다...</span>';
                    setTimeout(() => window.location.href = 'index.html', 800);
                } else {
                    msgBox.innerHTML = `<span class="error-msg">${data.detail || '로그인에 실패했습니다.'}</span>`;
                }
            } catch (err) {
                msgBox.innerHTML = `<span class="error-msg">인증 서버와 연결할 수 없습니다.</span>`;
            }
            document.getElementById('login-btn-submit').disabled = false;
        });

        // --- 회원가입 처리 ---
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('signup-msg');

            // 1. 비밀번호 재확인 검사 (10단계)
            const pw = document.getElementById('signup-pw').value;
            const pwConfirm = document.getElementById('signup-pw-confirm').value;
            if (pw !== pwConfirm) {
                msgBox.innerHTML = '<span class="error-msg">비밀번호가 서로 일치하지 않습니다.</span>';
                return;
            }

            msgBox.innerHTML = '<span style="color: grey;">가입 요청 전송 중...</span>';

            try {
                const res = await fetch(`${API_BASE_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('signup-id').value,
                        password: pw,
                        nickname: document.getElementById('signup-nick').value,
                        birth_date: document.getElementById('signup-birth').value,
                        school_name: document.getElementById('signup-school').value,
                        grade: document.getElementById('signup-grade').value,
                        phone_number: document.getElementById('signup-phone').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    // [9단계 변경] 회원가입을 하더라도 아직 is_active=0 이므로 로그인할 수 없습니다. 
                    // 즉시 홈으로 이동하지 않고 로그인 창으로 스위칭하며 대기 안내를 띄웁니다.
                    toggleMode('login');
                    document.getElementById('login-id').value = document.getElementById('signup-id').value;
                    document.getElementById('login-pw').value = '';
                    document.getElementById('login-msg').innerHTML = '<span class="success-msg" style="color:#FF9800; font-weight:bold;">✨ 가입 접수 완료! 관리자의 가입 승인을 기다려주세요.</span>';
                    document.getElementById('signup-form').reset();
                } else {
                    msgBox.innerHTML = `<span class="error-msg">${data.detail || '가입에 실패했습니다.'}</span>`;
                }
            } catch (err) {
                msgBox.innerHTML = `<span class="error-msg">인증 서버와 연결할 수 없습니다.</span>`;
            }
        });

        // --- 비밀번호 찾기 처리 (10단계) ---
        document.getElementById('find-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('find-msg');
            msgBox.innerHTML = '<span style="color: grey;">정보를 확인하는 중입니다...</span>';

            try {
                const res = await fetch(`${API_BASE_URL}/find-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('find-id').value,
                        birth_date: document.getElementById('find-birth').value,
                        phone_number: document.getElementById('find-phone').value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    msgBox.innerHTML = `<span class="success-msg" style="font-size:1.1rem;">찾았습니다!<br>회원님의 비밀번호는 <strong>[ ${data.password} ]</strong> 입니다.</span>`;
                } else {
                    msgBox.innerHTML = `<span class="error-msg">${data.detail || '정보를 찾을 수 없습니다.'}</span>`;
                }
            } catch (err) {
                msgBox.innerHTML = `<span class="error-msg">인증 서버와 연결할 수 없습니다.</span>`;
            }
        });
    </script>
</body>

</html>
